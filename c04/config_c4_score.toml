# config_c4_score.toml · C4 演示 server 配置 · 50 箱 · MQTT 传输 · 逐箱随机叠加噪声 · 方波激励打分
# 由 tools/gen_c4_config.py 生成；要改规模或噪声，请改脚本后重跑。
[server]
bind = "0.0.0.0"
port = 5020

[loop]
dt_s = 0.1
emit_dt_s = 0.5
sample_dt_s = 0.1

[[box]]
name = "box-1"
device_id = 1
plant             = { type = "thermal", params = { temp = 25.0, c_heat = 15.0, eta = 0.95, r_th = 0.40, t_env = 21.0 } }
sensor            = { type = "SimulatedTemperatureSensor", params = { name = "t1", noise = { type = "CompositeNoise", params = { sources = [ { type = "ImpulseNoise", params = { prob = 0.114, amplitude = 2.4, seed = 1 } }, { type = "SineNoise", params = { amplitude = 0.7, freq_hz = 1.5, phase = 0.35, dt = 0.5 } }, { type = "GaussianNoise", params = { std = 0.21, seed = 1 } } ] } } } }
actuator          = { type = "SimulatedHeaterActuator", params = { name = "h1", channel = "heat_power", max_power = 200.0 } }
sensor_endpoint   = { type = "MqttSensorEndpoint",   params = { name = "sep1", topic = "my-station/sensor/box-1" } }
actuator_endpoint = { type = "MqttActuatorEndpoint", params = { name = "aep1", topic = "my-station/actuator/box-1/cmd" } }
excitation        = { type = "SquareWave", params = { period = 52.0, duty = 0.5, high = 110.0, low = 90.0 } }
filtered_endpoint = { type = "MqttUplinkEndpoint", params = { name = "fbep1", topic = "my-station/score/box-1/filtered" } }
