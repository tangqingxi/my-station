[server]
host = "192.168.8.101"
port = 1883

[loop]
dt_s = 0.5
oversample = 5

[box]
device_id = 9
sensor_endpoint   = { type = "MqttSensorEndpoint",   params = { name = "sep", topic = "my-station/sensor/box-9" } }
actuator_endpoint = { type = "MqttActuatorEndpoint", params = { name = "aep", topic = "my-station/actuator/box-9/cmd" } }
filtered_endpoint = { type = "MqttUplinkEndpoint", params = { name = "fbep", topic = "my-station/score/box-9/filtered" } }
plant    = { params = { c_heat = 15.0, eta = 0.95, r_th = 0.40, t_env = 21.0 } }
actuator = { params = { max_power = 200.0 } }

[signal_processor]
type = "LowPassFilter"
params = { cutoff_hz = 0.2 }
