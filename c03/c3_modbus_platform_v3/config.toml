# config.toml · v3 多箱版
[server]
bind = "0.0.0.0"
port = 5020

[loop]
dt_s = 0.1

[[box]]
name = "box-1"
device_id = 1
plant             = { type = "thermal",                    params = { temp = 25.0, c_heat = 15.0, eta = 0.95, r_th = 0.40, t_env = 21.0 } }
sensor            = { type = "SimulatedTemperatureSensor", params = { name = "t1", noise_std = 0.0 } }
actuator          = { type = "SimulatedHeaterActuator",    params = { name = "h1", channel = "heat_power", max_power = 200.0 } }
sensor_endpoint   = { type = "ModbusSensorEndpoint",       params = { name = "tep1", register_address = 0 } }
actuator_endpoint = { type = "ModbusActuatorEndpoint",     params = { name = "aep1", coil_address = 0 } }